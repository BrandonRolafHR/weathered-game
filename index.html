<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link rel="stylesheet" href="/src/css/startscene.css">

  <title>Weathered</title>
</head>

<body>

  <div id="video-overlay">
    <video id="video"></video>
  </div>

  <div id="scene">
    <canvas id="bg"></canvas>

    <div id="ui">
      <div class="btn-wrap" id="btnwrap">

        <button class="menu-btn" id="btn-start">
          <div class="btn-inner">
            <span class="btn-arrow">▶</span>
            <span>Start</span>
          </div>
        </button>

        <div class="btn-divider"></div>

        <button class="menu-btn" id="btn-options">
          <div class="btn-inner">
            <span class="btn-arrow">▶</span>
            <span>Options</span>
          </div>
        </button>

        <div class="btn-divider"></div>

        <button class="menu-btn" id="btn-quit">
          <div class="btn-inner">
            <span class="btn-arrow">▶</span>
            <span>Quit</span>
          </div>
        </button>

      </div>
    </div>
  </div>

  <!-- Options menu -->
  <div id="options-panel" class="hidden">
    <div class="options-box">

      <h2>Options</h2>

      <button id="btn-fullscreen" class="option-btn">
        Fullscreen
      </button>

      <button id="btn-sound" class="option-btn">
        Sound: ON
      </button>

      <button id="btn-back" class="option-btn">
        Back
      </button>

    </div>
  </div>

  <script type="module" src="/src/js/game.js"></script>

</body>
</html>
